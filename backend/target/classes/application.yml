spring:
  application:
    name: rentflow
  datasource:
    url: ${DB_URL:jdbc:h2:mem:rentflow;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

server:
  port: 8080

rentflow:
  jwt-secret: ${JWT_SECRET:change-this-secret-before-production-change-this-secret}
  demo:
    email: demo@rentflow.com
    password: demo123

springdoc:
  swagger-ui:
    path: /swagger-ui.html
